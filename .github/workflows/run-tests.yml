name: run-tests

# This workflow is triggered by the slash command dispatcher when a
# collaborator comments `/run-tests` on a pull request.
#
# It creates a GitHub Check Run on the PR's head commit so that:
#   • The result appears under the PR's "Checks" tab exactly like any
#     other CI job.
#   • The check name "run-tests" can be added as a required status check
#     in your branch protection rules (Settings → Branches → require
#     status checks → search for "run-tests").
#
# To trigger manually:  leave a comment `/run-tests` on any open PR.

on:
  repository_dispatch:
    types: [slash-run-tests]

permissions:
  checks: write
  contents: read

jobs:
  run-tests:
    name: run-tests
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Create a "pending / in-progress" check run on the PR commit.
      #    This makes the check show up immediately in the PR UI.
      # ------------------------------------------------------------------
      - name: Create check run (in_progress)
        id: check
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { data } = await github.rest.checks.create({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              name:       'run-tests',
              head_sha:   '${{ github.event.client_payload.sha }}',
              status:     'in_progress',
              started_at: new Date().toISOString(),
              details_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              output: {
                title:   'Tests in progress',
                summary: `Triggered by @${{ github.event.client_payload.actor }} via /run-tests`,
              },
            });
            return String(data.id);

      # ------------------------------------------------------------------
      # 2. Check out the exact commit from the PR branch.
      # ------------------------------------------------------------------
      - name: Check out PR commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha }}

      # ------------------------------------------------------------------
      # 3. Run the test suite.
      #    Replace / extend the steps in this section with your real tests.
      # ------------------------------------------------------------------
      - name: Run tests
        id: tests
        run: |
          echo "Running tests for PR #${{ github.event.client_payload.pr_number }}"
          echo "Commit: ${{ github.event.client_payload.sha }}"
          bash test.sh

      # ------------------------------------------------------------------
      # 4a. Mark the check run as successful.
      # ------------------------------------------------------------------
      - name: Complete check run (success)
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.checks.update({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              check_run_id: ${{ steps.check.outputs.result }},
              status:       'completed',
              conclusion:   'success',
              completed_at: new Date().toISOString(),
              output: {
                title:   'Tests passed',
                summary: 'All tests passed successfully.',
              },
            });

      # ------------------------------------------------------------------
      # 4b. Mark the check run as failed if any earlier step failed.
      # ------------------------------------------------------------------
      - name: Complete check run (failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.checks.update({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              check_run_id: ${{ steps.check.outputs.result }},
              status:       'completed',
              conclusion:   'failure',
              completed_at: new Date().toISOString(),
              output: {
                title:   'Tests failed',
                summary: 'One or more tests failed. See the workflow logs for details.',
              },
            });
